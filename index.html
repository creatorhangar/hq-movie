<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create professional animated videos from your images. Ken Burns effects, narration, transitions. No subscription. 100% offline.">
  <meta name="theme-color" content="#0a0e17">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- SEO -->
  <title>HQ Movie - Motion Comic Creator</title>
  
  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="HQ Movie - Turn Images into Motion Comics">
  <meta property="og:description" content="Professional video creation tool for storytellers, educators, and content creators.">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="pt_BR">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="HQ Movie - Motion Comic Creator">
  <meta name="twitter:description" content="Create professional animated videos from your images. Ken Burns effects, narration, transitions.">
  
  <!-- PWA -->
  <meta name="application-name" content="HQ Movie">
  <meta name="apple-mobile-web-app-title" content="HQ Movie">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bangers&family=Comic+Neue:ital,wght@0,400;0,700;1,400&family=Patrick+Hand&family=Kalam:wght@300;400;700&family=Roboto+Condensed:wght@300;400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@400;700;900&family=Fredoka+One&family=Bebas+Neue&family=Black+Han+Sans&family=Anton&family=Archivo+Black&family=Koulen&family=Syne:wght@400;600;700;800&family=Lilita+One&family=Righteous&family=Boogaloo&family=Permanent+Marker&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles-v3.css?v=35">
</head>

<body>
  <div id="app"></div>

  <!-- Floating Text Toolbar -->
  <div id="floating-text-toolbar" class="ftt">
    <div class="ftt-field">
      <span class="ftt-field-label" id="ftt-label-font">Font</span>
      <select class="ftt-font" data-ft="font" onchange="App.ftSetFont(this.value)">
        <option value="serif">Serif</option>
        <option value="sans">Sans</option>
        <option value="comic">Comic</option>
        <option value="mono">Mono</option>
        <option value="display">Display</option>
        <option value="marker">Marker</option>
      </select>
    </div>

    <div class="ftt-field ftt-field-size">
      <span class="ftt-field-label" id="ftt-label-size">Size</span>
      <div class="ftt-size-row">
        <input type="range" class="ftt-size-slider" data-ft="size-slider" min="12" max="250" step="1" value="24"
               oninput="App.ftSyncSizeFromSlider(this.value)" title="Font size">
        <div class="ftt-size-input-wrap">
          <input type="number" class="ftt-size" data-ft="size" min="12" max="250" step="1" value="24"
                 oninput="App.ftSyncSizeFromInput(this.value)" title="Exact size">
          <span class="ftt-unit">px</span>
        </div>
      </div>
    </div>

    <div class="ftt-action-row">
      <button class="ftt-btn" data-ft="bold" onclick="App.ftToggleBold()" id="ftt-btn-bold" title="Bold (Ctrl+B)"><b>B</b></button>
      <button class="ftt-btn" data-ft="italic" onclick="App.ftToggleItalic()" id="ftt-btn-italic" title="Italic (Ctrl+I)"><i>I</i></button>
      <button class="ftt-btn" data-ft="underline" onclick="App.ftToggleUnderline()" id="ftt-btn-underline" title="Underline (Ctrl+U)"><u>U</u></button>
      <button class="ftt-btn" data-ft-align="left" onclick="App.ftSetAlign('left')" id="ftt-btn-align-left" title="Align left"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="1" width="14" height="2" rx="1"/><rect x="0" y="5" width="10" height="2" rx="1"/><rect x="0" y="9" width="12" height="2" rx="1"/></svg></button>
      <button class="ftt-btn" data-ft-align="center" onclick="App.ftSetAlign('center')" id="ftt-btn-align-center" title="Center"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="1" width="14" height="2" rx="1"/><rect x="2" y="5" width="10" height="2" rx="1"/><rect x="1" y="9" width="12" height="2" rx="1"/></svg></button>
      <button class="ftt-btn" data-ft-align="right" onclick="App.ftSetAlign('right')" id="ftt-btn-align-right" title="Align right"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="1" width="14" height="2" rx="1"/><rect x="4" y="5" width="10" height="2" rx="1"/><rect x="2" y="9" width="12" height="2" rx="1"/></svg></button>
      <button class="ftt-btn" data-ft-align="justify" onclick="App.ftSetAlign('justify')" id="ftt-btn-align-justify" title="Justify"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="1" width="14" height="2" rx="1"/><rect x="0" y="5" width="14" height="2" rx="1"/><rect x="0" y="9" width="14" height="2" rx="1"/></svg></button>
    </div>
  </div>

  <!-- Transition Modal -->
  <div id="transition-modal" class="modal-overlay" style="display:none; align-items:center; justify-content:center;">
    <div class="modal-content">
      <div class="modal-header">
        <span id="transition-modal-title">Transition</span>
        <button onclick="App.closeTransitionModal()" style="background:none;border:none;color:var(--text-2);cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">
        <label class="radio-option" onclick="this.querySelector('input').checked=true; App.updateTransitionModalSelection(this)">
          <input type="radio" name="transition" value="cut">
          <span class="radio-label" id="transition-cut-label">Hard Cut (None)</span>
        </label>
        <label class="radio-option" onclick="this.querySelector('input').checked=true; App.updateTransitionModalSelection(this)">
          <input type="radio" name="transition" value="fade-0.5">
          <span class="radio-label" id="transition-fade-default-label">Default Fade (0.5s)</span>
        </label>
        <label class="radio-option" onclick="this.querySelector('input').checked=true; App.updateTransitionModalSelection(this)">
          <input type="radio" name="transition" value="fade-1.0">
          <span class="radio-label" id="transition-fade-slow-label">Slow Fade (1.0s)</span>
        </label>
        <label class="radio-option" onclick="this.querySelector('input').checked=true; App.updateTransitionModalSelection(this)">
          <input type="radio" name="transition" value="fade-0.2">
          <span class="radio-label" id="transition-fade-fast-label">Fast Fade (0.2s)</span>
        </label>
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="App.closeTransitionModal()" id="transition-cancel-btn">Cancel</button>
        <button class="modal-btn primary" onclick="App.applyTransition()" id="transition-apply-btn">Apply</button>
      </div>
    </div>
  </div>

  <!-- Recording Modal (Microphone Narration) -->
  <div id="recording-modal" class="recording-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3><span id="rec-modal-title">Recording</span></h3>
        <button class="close-btn" onclick="App.closeRecordingModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="rec-status">
          <div class="rec-status-label" id="rec-status-label">Status</div>
          <div id="rec-status-text" class="rec-status-text">Ready</div>
        </div>
        <div id="rec-timer" class="rec-timer">00:00</div>
        <div class="mic-level-bar-wrap">
          <div id="mic-level-bar" class="mic-level-bar"></div>
        </div>
        <div class="rec-buttons">
          <button id="rec-btn-record" class="rec-btn record" onclick="App.startMicrophoneRecording()">🔴 <span id="rec-btn-record-label">Record</span></button>
          <button id="rec-btn-stop" class="rec-btn stop" onclick="App.stopMicrophoneRecording()" disabled>⏹️ <span id="rec-btn-stop-label">Stop</span></button>
          <button id="rec-btn-play" class="rec-btn play" onclick="App.playRecordedAudio()" disabled>▶️ <span id="rec-btn-play-label">Play</span></button>
          <button id="rec-btn-save" class="rec-btn save" onclick="App.saveRecordedAudio()" disabled>💾 <span id="rec-btn-save-label">Save</span></button>
        </div>
        <button class="rec-cancel" onclick="App.closeRecordingModal()" id="rec-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Excalidraw Modal -->
  <div id="excalidraw-modal" class="modal-overlay" style="display:none; align-items:center; justify-content:center;">
    <div class="modal-content" style="width: 90vw; height: 90vh; max-width: 1200px; display: flex; flex-direction: column;">
      <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:bold; font-size:14px;" id="excalidraw-modal-title">Drawing</span>
        <div style="display:flex; gap:8px; align-items:center;">
          <span style="font-size:10px; color:var(--text-3);" id="excalidraw-guides-label">Guides:</span>
          <button class="modal-btn secondary" onclick="App.setExcalidrawPreset('9:16')" style="padding:4px 8px; font-size:10px;">9:16</button>
          <button class="modal-btn secondary" onclick="App.setExcalidrawPreset('16:9')" style="padding:4px 8px; font-size:10px;">16:9</button>
          <button class="modal-btn secondary" onclick="App.setExcalidrawPreset('1:1')" style="padding:4px 8px; font-size:10px;">1:1</button>
        </div>
        <button onclick="App.closeExcalidrawModal()" style="background:none;border:none;color:var(--text-2);cursor:pointer;font-size:16px;">✕</button>
      </div>
      <div class="modal-body" style="flex: 1; padding: 0; position: relative;">
        <div id="excalidraw-container" style="width: 100%; height: 100%;"></div>
      </div>
      <div class="modal-actions" style="padding: 12px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between;">
        <button class="modal-btn secondary" onclick="App.closeExcalidrawModal()" id="excalidraw-cancel-btn">Cancel</button>
        <button class="modal-btn primary" onclick="App.saveExcalidrawArt()" id="excalidraw-save-btn">Save to Page</button>
      </div>
    </div>
  </div>

  <!-- Persistent hidden file inputs (outside dynamic #app to survive re-renders) -->
  <input type="file" id="file-input-persistent" accept="image/*" multiple style="display:none">
  <input type="file" id="sticker-picker-hidden" accept="image/png,image/svg+xml,image/webp,image/gif" multiple style="display:none">
  <input type="file" id="import-project-input" accept=".hq" style="display:none" onchange="App.importProject(event)">

  <!-- Local libs (vendored) -->
  <script src="vendor/dompurify.min.js"></script>
  <script src="vendor/dexie.min.js"></script>
  <script src="vendor/jspdf.umd.min.js"></script>
  <script src="vendor/html2canvas.min.js"></script>
  <script src="vendor/jszip.min.js"></script>
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/excalidraw.production.min.js"></script>
  <script src="i18n.js?v=5"></script>
  <script src="layouts.js?v=4"></script>
  <script src="layouts-video.js?v=7"></script>
  <script src="app.js?v=12"></script>
  <script src="thumbnail-generator.js?v=1"></script>
  <script src="video-exporter.js?v=11"></script>
  <script src="ui.js?v=37"></script>
  <script src="onboarding.js?v=8"></script>
  <script src="controller.js?v=31"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW registration failed:', err));
    }
  </script>
</body>

</html>
