<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description"
    content="HQ Movie — Crie motion comics com áudio e exporte vídeos para redes sociais, totalmente offline.">
  <meta name="theme-color" content="#0a0e17">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>HQ Movie</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bangers&family=Comic+Neue:ital,wght@0,400;0,700;1,400&family=Patrick+Hand&family=Kalam:wght@300;400;700&family=Roboto+Condensed:wght@300;400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@400;700;900&family=Fredoka+One&family=Bebas+Neue&family=Black+Han+Sans&family=Anton&family=Archivo+Black&family=Koulen&family=Syne:wght@400;600;700;800&family=Lilita+One&family=Righteous&family=Boogaloo&family=Permanent+Marker&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles-v3.css?v=20">
</head>

<body>
  <div id="app"></div>

  <!-- Floating Text Toolbar -->
  <div id="floating-text-toolbar" class="ftt">
    <div class="ftt-field">
      <span class="ftt-field-label">Font</span>
      <select class="ftt-font" data-ft="font" onchange="App.ftSetFont(this.value)">
        <option value="serif">Serif</option>
        <option value="sans">Sans</option>
        <option value="comic">Comic</option>
        <option value="mono">Mono</option>
        <option value="display">Display</option>
        <option value="marker">Marker</option>
      </select>
    </div>

    <div class="ftt-field ftt-field-size">
      <span class="ftt-field-label">Size</span>
      <div class="ftt-size-row">
        <input type="range" class="ftt-size-slider" data-ft="size-slider" min="12" max="250" step="1" value="24"
               oninput="App.ftSyncSizeFromSlider(this.value)" title="Tamanho da fonte">
        <div class="ftt-size-input-wrap">
          <input type="number" class="ftt-size" data-ft="size" min="12" max="250" step="1" value="24"
                 oninput="App.ftSyncSizeFromInput(this.value)" title="Tamanho exato">
          <span class="ftt-unit">px</span>
        </div>
      </div>
    </div>

    <div class="ftt-action-row">
      <button class="ftt-btn" data-ft="bold" onclick="App.ftToggleBold()" title="Negrito (Ctrl+B)"><b>B</b></button>
      <button class="ftt-btn" data-ft="italic" onclick="App.ftToggleItalic()" title="Itálico (Ctrl+I)"><i>I</i></button>
      <button class="ftt-btn" data-ft="underline" onclick="App.ftToggleUnderline()" title="Sublinhado (Ctrl+U)"><u>U</u></button>
      <button class="ftt-btn" data-ft-align="left" onclick="App.ftSetAlign('left')" title="Alinhar esquerda"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="1" width="14" height="2" rx="1"/><rect x="0" y="5" width="10" height="2" rx="1"/><rect x="0" y="9" width="12" height="2" rx="1"/></svg></button>
      <button class="ftt-btn" data-ft-align="center" onclick="App.ftSetAlign('center')" title="Centralizar"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="1" width="14" height="2" rx="1"/><rect x="2" y="5" width="10" height="2" rx="1"/><rect x="1" y="9" width="12" height="2" rx="1"/></svg></button>
      <button class="ftt-btn" data-ft-align="right" onclick="App.ftSetAlign('right')" title="Alinhar direita"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="1" width="14" height="2" rx="1"/><rect x="4" y="5" width="10" height="2" rx="1"/><rect x="2" y="9" width="12" height="2" rx="1"/></svg></button>
      <button class="ftt-btn" data-ft-align="justify" onclick="App.ftSetAlign('justify')" title="Justificar"><svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="1" width="14" height="2" rx="1"/><rect x="0" y="5" width="14" height="2" rx="1"/><rect x="0" y="9" width="14" height="2" rx="1"/></svg></button>
    </div>
  </div>

  <!-- Transition Modal -->
  <div id="transition-modal" class="modal-overlay" style="display:none; align-items:center; justify-content:center;">
    <div class="modal-content">
      <div class="modal-header">
        <span>Transição</span>
        <button onclick="App.closeTransitionModal()" style="background:none;border:none;color:var(--text-2);cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">
        <label class="radio-option" onclick="this.querySelector('input').checked=true; App.updateTransitionModalSelection(this)">
          <input type="radio" name="transition" value="cut">
          <span class="radio-label">Corte Seco (Nenhuma)</span>
        </label>
        <label class="radio-option" onclick="this.querySelector('input').checked=true; App.updateTransitionModalSelection(this)">
          <input type="radio" name="transition" value="fade-0.5">
          <span class="radio-label">Fade Padrão (0.5s)</span>
        </label>
        <label class="radio-option" onclick="this.querySelector('input').checked=true; App.updateTransitionModalSelection(this)">
          <input type="radio" name="transition" value="fade-1.0">
          <span class="radio-label">Fade Lento (1.0s)</span>
        </label>
        <label class="radio-option" onclick="this.querySelector('input').checked=true; App.updateTransitionModalSelection(this)">
          <input type="radio" name="transition" value="fade-0.2">
          <span class="radio-label">Fade Rápido (0.2s)</span>
        </label>
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="App.closeTransitionModal()">Cancelar</button>
        <button class="modal-btn primary" onclick="App.applyTransition()">Aplicar</button>
      </div>
    </div>
  </div>

  <!-- Persistent hidden file inputs (outside dynamic #app to survive re-renders) -->
  <input type="file" id="file-input-persistent" accept="image/*" multiple style="display:none">
  <input type="file" id="sticker-picker-hidden" accept="image/png,image/svg+xml,image/webp,image/gif" multiple style="display:none">
  <input type="file" id="import-project-input" accept=".hq" style="display:none" onchange="App.importProject(event)">

  <!-- Local libs (vendored) -->
  <script src="vendor/dexie.min.js"></script>
  <script src="vendor/jspdf.umd.min.js"></script>
  <script src="vendor/html2canvas.min.js"></script>
  <script src="vendor/jszip.min.js"></script>
  <script src="i18n.js?v=1"></script>
  <script src="layouts.js?v=4"></script>
  <script src="layouts-video.js?v=4"></script>
  <script src="app.js?v=8"></script>
  <script src="video-exporter.js?v=8"></script></script>
  <script src="ui.js?v=19"></script>
  <script src="onboarding.js?v=5"></script>
  <script src="controller.js?v=15"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW registration failed:', err));
    }
  </script>
</body>

</html>
