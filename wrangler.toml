name = "hqmovie"
compatibility_date = "2025-09-27"

# Cloudflare Pages configuration
pages_build_output_dir = "."

# Excluir arquivos desnecessários do deploy
[site]
bucket = "."
exclude = [
  "node_modules/**",
  "tests/**",
  "files/**",
  ".git/**",
  ".windsurf/**",
  "*.log",
  "serve.pid",
  "serve-nocache.py",
  "test-*.html",
  "test-*.js",
  "package.json",
  "package-lock.json",
  "AUDITORIA-FONTES.md",
  "REPORT-LAUNCH-LEAVE.md",
  "LAUNCH-AND-LEAVE.md",
  "ARCHITECTURE.md",
  "DATA_MODEL.md",
  "I18N-GUIDE.md",
  "HOW_TO_DEPLOY.md"
]
