<!DOCTYPE html>

<head>

    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            background: #0a0a0a;
            color: #e0e0e0;

        button {

        .video-card {

    </style>

<body>
    <h1>🎬 HQ Movie - Teste de Estresse Completo</h1>

    <div class="video-grid" id="video-grid"></div>

    <script>
        // Definições de formatos de vídeo
        const VIDEO_FORMATS = {
            vertical: { 
                id: 'vertical',
                name: 'Vertical (9:16)', 
                width: 1080, 
                height: 1920,
                ratio: 9/16
            },
            widescreen: { 
                id: 'widescreen',
                name: 'Widescreen (16:9)', 
                width: 1920, 
                height: 1080,
                ratio: 16/9
            },
            square: { 
                id: 'square',
                name: 'Quadrado (1:1)', 
                width: 1080, 
                height: 1080,
                ratio: 1
            },
            portrait: { 
                id: 'portrait',
                name: 'Retrato (4:3)', 
                width: 1440, 
                height: 1080,
                ratio: 4/3
            }
        };

        // Efeitos Ken Burns disponíveis
        const KEN_BURNS_EFFECTS = ['static', 'zoomIn', 'zoomOut', 'panLeft', 'panRight', 'panUp', 'float'];
        
        // Transições disponíveis
        const TRANSITIONS = ['none', 'fade', 'slide', 'zoom'];
        
        // Imagens disponíveis
        const AVAILABLE_IMAGES = [
            '/img/66d6e88f025a7050bc4eb17e5b49b834.jpg',
            '/img/8fdc28880a7c91b6bc8a02e8c6d90918.jpg',
            '/img/Desenhos-dos-anos-2000-danny.jpg',
            '/img/Monica5-1-.webp'
        ];

        // Textos de exemplo grandes
        const LONG_TEXTS = [
            "Este é um teste completo de estresse do HQ Movie! Verificando a capacidade de renderização de textos longos e complexos em múltiplas linhas dentro dos balões de diálogo.",
            "O sistema está sendo testado com vídeos longos, múltiplas páginas, transições suaves entre cenas, e diversos efeitos de animação Ken Burns para garantir a estabilidade.",
            "Testando renderização de textos com diferentes tamanhos, fontes variadas (comic, marker, serif), e múltiplos balões na mesma cena para avaliar performance.",
            "Análise de consumo de memória e processamento durante a geração de vídeos em alta resolução com múltiplos elementos visuais simultâneos.",
            "Validação da qualidade de exportação em diferentes formatos (vertical, widescreen, square, portrait) com durações estendidas por página.",
            "Teste de resistência do sistema com operações contínuas de gravação de canvas e processamento de frames em tempo real."
        ];

        function getProjectDims(project) {
            const format = VIDEO_FORMATS[project.videoFormat] || VIDEO_FORMATS.vertical;
            return {
                canvasW: format.width,
                canvasH: format.height,
                viewW: format.width,
                viewH: format.height
            };
        }

        class VideoExporter {
            constructor(project, options = {}) {
                this.project = project;
                this.canvas = null;
                this.ctx = null;
                this.mediaRecorder = null;
                this.chunks = [];
                this.fps = 30;
                this.videoBitrate = options.videoBitrate || 8000000;
            }
            
            async export() {
                try {
                    const dims = getProjectDims(this.project);
                    this.canvas = document.createElement('canvas');
                    this.canvas.width = dims.canvasW;
                    this.canvas.height = dims.canvasH;
                    this.ctx = this.canvas.getContext('2d');
                    
                    const stream = this.canvas.captureStream(this.fps);
                    this.mediaRecorder = new MediaRecorder(stream, { 
                        mimeType: 'video/webm;codecs=vp9',
                        videoBitsPerSecond: this.videoBitrate
                    });
                    
                    this.chunks = [];
                    this.mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) this.chunks.push(e.data);
                    };
                    
                    this.mediaRecorder.start();
                    
                    for (let i = 0; i < this.project.pages.length; i++) {
                        const page = this.project.pages[i];
                        
                        // Aplicar transição entre páginas (exceto a primeira)
                        if (i > 0 && page.transition !== 'none') {
                            await this.applyTransition(this.project.pages[i-1], page);
                        }
                        
                        await this.renderPage(page, page.duration || 8);
                    }
                    
                    return await this.finalize();
                } catch (error) {
                    console.error('Erro ao exportar vídeo:', error);
                    throw error;
                }
            }
            
            async applyTransition(fromPage, toPage) {
                const transitionFrames = 15; // 0.5 segundos
                
                for (let frame = 0; frame < transitionFrames; frame++) {
                    const progress = frame / transitionFrames;
                    
                    if (toPage.transition === 'fade') {
                        this.ctx.globalAlpha = 1 - progress;
                        await this.renderPageFrame(fromPage);
                        this.ctx.globalAlpha = progress;
                        await this.renderPageFrame(toPage);
                        this.ctx.globalAlpha = 1;
                    } else if (toPage.transition === 'slide') {
                        // Slide da direita para esquerda
                        this.ctx.save();
                        this.ctx.translate(-this.canvas.width * progress, 0);
                        await this.renderPageFrame(fromPage);
                        this.ctx.restore();
                        
                        this.ctx.save();
                        this.ctx.translate(this.canvas.width * (1 - progress), 0);
                        await this.renderPageFrame(toPage);
                        this.ctx.restore();
                    }
                    
                    await this.waitFrame();
                }
            }
            
            async renderPage(page, durationSeconds) {
                const totalFrames = Math.floor(durationSeconds * this.fps);
                
                // Pré-carregar imagens
                const images = [];
                if (page.images && page.images.length > 0) {
                    for (const imgData of page.images) {
                        const img = new Image();
                        await new Promise((resolve) => {
                            img.onload = resolve;
                            img.onerror = resolve;
                            img.src = imgData.src;
                        });
                        images.push(img);
                    }
                }
                
                for (let frame = 0; frame < totalFrames; frame++) {
                    await this.renderPageFrame(page, images, frame / totalFrames);
                    await this.waitFrame();
                }
            }
            
            async renderPageFrame(page, images = [], progress = 0) {
                // Background gradiente
                const gradient = this.ctx.createLinearGradient(0, 0, this.canvas.width, this.canvas.height);
                gradient.addColorStop(0, '#2a0845');
                gradient.addColorStop(1, '#1a1a2e');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Aplicar Ken Burns
                this.ctx.save();
                this.applyKenBurns(page.kenBurns || 'static', progress);
                
                // Desenhar imagens
                if (images && images.length > 0) {
                    images.forEach((img, index) => {
                        if (img.complete) {
                            const imgRatio = img.width / img.height;
                            const canvasRatio = this.canvas.width / this.canvas.height;
                            
                            let drawWidth, drawHeight, drawX, drawY;
                            
                            if (imgRatio > canvasRatio) {
                                drawHeight = this.canvas.height;
                                drawWidth = drawHeight * imgRatio;
                                drawX = (this.canvas.width - drawWidth) / 2;
                                drawY = 0;
                            } else {
                                drawWidth = this.canvas.width;
                                drawHeight = drawWidth / imgRatio;
                                drawX = 0;
                                drawY = (this.canvas.height - drawHeight) / 2;
                            }
                            
                            // Aplicar transparência para imagens adicionais
                            if (index > 0) {
                                this.ctx.globalAlpha = 0.7;
                            }
                            
                            this.ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
                            this.ctx.globalAlpha = 1;
                        }
                    });
                }
                
                this.ctx.restore();
                
                // Desenhar textos (sempre no topo)
                this.drawBalloons(page.texts || []);
            }
            
            applyKenBurns(mode, progress) {
                const w = this.canvas.width;
                const h = this.canvas.height;
                
                switch (mode) {
                    case 'zoomIn':
                        const scaleIn = 1 + (progress * 0.3);
                        this.ctx.translate(w / 2, h / 2);
                        this.ctx.scale(scaleIn, scaleIn);
                        this.ctx.translate(-w / 2, -h / 2);
                        break;
                    case 'zoomOut':
                        const scaleOut = 1.3 - (progress * 0.3);
                        this.ctx.translate(w / 2, h / 2);
                        this.ctx.scale(scaleOut, scaleOut);
                        this.ctx.translate(-w / 2, -h / 2);
                        break;
                    case 'panLeft':
                        const offsetLeft = -progress * w * 0.2;
                        this.ctx.translate(offsetLeft, 0);
                        break;
                    case 'panRight':
                        const offsetRight = progress * w * 0.2;
                        this.ctx.translate(offsetRight, 0);
                        break;
                    case 'panUp':
                        const offsetUp = -progress * h * 0.2;
                        this.ctx.translate(0, offsetUp);
                        break;
                    case 'float':
                        const floatScale = 1 + (Math.sin(progress * Math.PI) * 0.1);
                        const floatX = Math.sin(progress * Math.PI * 2) * w * 0.03;
                        const floatY = Math.cos(progress * Math.PI * 2) * h * 0.03;
                        this.ctx.translate(w / 2 + floatX, h / 2 + floatY);
                        this.ctx.scale(floatScale, floatScale);
                        this.ctx.translate(-w / 2, -h / 2);
                        break;
                }
            }
            
            drawBalloons(texts) {
                texts.forEach(balloon => {
                    this.ctx.save();
                    
                    const x = balloon.x || 50;
                    const y = balloon.y || 50;
                    const w = balloon.w || 400;
                    const h = balloon.h || 150;
                    
                    // Desenhar balão com base no tipo
                    if (balloon.type === 'speech') {
                        this.ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                        this.ctx.strokeStyle = '#000000';
                        this.ctx.lineWidth = 4;
                        
                        this.drawRoundedRect(x, y, w, h, 25);
                        this.ctx.fill();
                        this.ctx.stroke();
                        
                        // Cauda
                        this.ctx.beginPath();
                        const tailDir = balloon.direction || 's';
                        if (tailDir === 's') {
                            this.ctx.moveTo(x + w/3, y + h);
                            this.ctx.lineTo(x + w/3 - 25, y + h + 40);
                            this.ctx.lineTo(x + w/3 + 25, y + h + 40);
                        }
                        this.ctx.closePath();
                        this.ctx.fill();
                        this.ctx.stroke();
                    } else if (balloon.type === 'thought') {
                        this.ctx.fillStyle = 'rgba(240, 240, 255, 0.95)';
                        this.ctx.strokeStyle = '#000000';
                        this.ctx.lineWidth = 3;
                        
                        this.drawRoundedRect(x, y, w, h, 30);
                        this.ctx.fill();
                        this.ctx.stroke();
                        
                        // Bolinhas de pensamento
                        for (let i = 0; i < 3; i++) {
                            this.ctx.beginPath();
                            this.ctx.arc(x + w/2 - 20 + i*20, y + h + 10 + i*10, 8 - i*2, 0, Math.PI * 2);
                            this.ctx.fill();
                            this.ctx.stroke();
                        }
                    } else {
                        this.ctx.fillStyle = 'rgba(255, 255, 200, 0.95)';
                        this.ctx.strokeStyle = '#000000';
                        this.ctx.lineWidth = 3;
                        this.drawRoundedRect(x, y, w, h, 15);
                        this.ctx.fill();
                        this.ctx.stroke();
                    }
                    
                    // Desenhar texto com quebra automática de linha
                    this.ctx.fillStyle = balloon.color || '#000000';
                    const fontSize = balloon.fontSize || 18;
                    this.ctx.font = `bold ${fontSize}px ${this.getFontFamily(balloon.font)}`;
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    
                    // Sombra para melhor legibilidade
                    this.ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
                    this.ctx.shadowBlur = 3;
                    this.ctx.shadowOffsetX = 2;
                    this.ctx.shadowOffsetY = 2;
                    
                    // Quebrar texto em linhas
                    const lines = this.wrapText(balloon.text, w - 40);
                    const lineHeight = fontSize * 1.4;
                    const startY = y + h/2 - ((lines.length - 1) * lineHeight) / 2;
                    
                    lines.forEach((line, i) => {
                        this.ctx.fillText(line, x + w/2, startY + i * lineHeight);
                    });
                    
                    this.ctx.restore();
                });
            }
            
            wrapText(text, maxWidth) {
                const words = text.split(' ');
                const lines = [];
                let currentLine = '';
                
                words.forEach(word => {
                    const testLine = currentLine + (currentLine ? ' ' : '') + word;
                    const metrics = this.ctx.measureText(testLine);
                    
                    if (metrics.width > maxWidth && currentLine) {
                        lines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine = testLine;
                    }
                });
                
                if (currentLine) lines.push(currentLine);
                return lines;
            }
            
            drawRoundedRect(x, y, w, h, r) {
                this.ctx.beginPath();
                this.ctx.moveTo(x + r, y);
                this.ctx.lineTo(x + w - r, y);
                this.ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                this.ctx.lineTo(x + w, y + h - r);
                this.ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.ctx.lineTo(x + r, y + h);
                this.ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                this.ctx.lineTo(x, y + r);
                this.ctx.quadraticCurveTo(x, y, x + r, y);
                this.ctx.closePath();
            }
            
            getFontFamily(font) {
                const fonts = {
                    comic: 'Comic Sans MS, cursive',
                    marker: 'Permanent Marker, cursive',
                    serif: 'Georgia, serif',
                    sans: 'Arial, sans-serif'
                };
                return fonts[font] || 'Arial, sans-serif';
            }
            
            waitFrame() {
                return new Promise(resolve => setTimeout(resolve, 1000 / this.fps));
            }
            
            async finalize() {
                return new Promise((resolve, reject) => {
                    this.mediaRecorder.onstop = () => {
                        const blob = new Blob(this.chunks, { type: 'video/webm' });
                        resolve(blob);
                    };
                    this.mediaRecorder.onerror = (e) => {
                        reject(new Error('Erro no MediaRecorder: ' + e.error));
                    };
                    this.mediaRecorder.stop();
                });
            }
        }

        let generatedVideos = [];
        let isGenerating = false;
        let testStartTime = 0;
        
        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        function updateProgress(current, total) {
            document.getElementById('progress-text').textContent = `${current}/${total}`;
            document.getElementById('progress-fill').style.width = `${(current/total)*100}%`;
        }
        
        function updateStatus(text) {
            document.getElementById('status-text').textContent = text;
        }
        
        async function loadProject(filename) {
            const response = await fetch(`../projects/${filename}.json`);
            if (!response.ok) throw new Error(`Projeto não encontrado: ${filename}`);
            return await response.json();
        }
        
        function createStressTestProject(format, pageCount, durationPerPage, textSize, kenBurnsType, transitionType) {
            const sizes = { small: 14, medium: 18, large: 24, xlarge: 32 };
            const fontSize = sizes[textSize] || 18;
            
            let kenBurnsEffects;
            if (kenBurnsType === 'static') kenBurnsEffects = ['static'];
            else if (kenBurnsType === 'dynamic') kenBurnsEffects = ['zoomIn', 'zoomOut', 'panLeft', 'panRight', 'panUp', 'float'];
            else kenBurnsEffects = KEN_BURNS_EFFECTS;
            
            let transitions;
            if (transitionType === 'fade') transitions = ['fade'];
            else if (transitionType === 'none') transitions = ['none'];
            else transitions = TRANSITIONS;
            
            const project = {
                id: `stress_${format}_${Date.now()}`,
                metadata: {
                    name: `STRESS-TEST-${format.toUpperCase()}`,
                    createdAt: Date.now(),
                    updatedAt: Date.now()
                },
                videoFormat: format,
                videoAudio: {
                    backgroundMusic: null,
                    backgroundMusicVolume: 0.3
                },
                customLayouts: [],
                favoriteLayoutId: null,
                pages: []
            };
            
            for (let i = 0; i < pageCount; i++) {
                const page = {
                    id: `page_${i}`,
                    layoutId: `${format[0]}${(i % 4) + 1}`,
                    kenBurns: kenBurnsEffects[i % kenBurnsEffects.length],
                    duration: durationPerPage,
                    durationLocked: false,
                    audioNarration: null,
                    transition: transitions[i % transitions.length],
                    images: [],
                    texts: [],
                    showTextBelow: true,
                    narrative: `Página ${i + 1} do teste de estresse`
                };
                
                // Adicionar imagem
                const formatInfo = VIDEO_FORMATS[format];
                page.images = [{
                    src: AVAILABLE_IMAGES[i % AVAILABLE_IMAGES.length],
                    x: 0, y: 0, w: formatInfo.width, h: formatInfo.height
                }];
                
                // Adicionar múltiplos textos
                const textCount = 2 + (i % 3); // 2 a 4 textos por página
                for (let j = 0; j < textCount; j++) {
                    const textTypes = ['speech', 'thought', 'caption'];
                    const textType = textTypes[j % textTypes.length];
                    
                    page.texts.push({
                        id: `text_${i}_${j}`,
                        type: textType,
                        text: LONG_TEXTS[(i * textCount + j) % LONG_TEXTS.length],
                        x: 50 + (j % 2) * 500,
                        y: 200 + Math.floor(j / 2) * 300,
                        w: 400 + (j % 2) * 100,
                        h: 120 + fontSize * 2,
                        direction: ['s', 'se', 'sw'][j % 3],
                        font: ['comic', 'marker', 'serif'][j % 3],
                        fontSize: fontSize,
                        color: '#000000'
                    });
                }
                
                project.pages.push(page);
            }
            
            return project;
        }
        
        async function generateVideo(project, options = {}) {
            const testName = project.metadata.name;
            log(`Gerando: ${testName} (${project.pages.length} páginas, ${project.pages.reduce((s, p) => s + p.duration, 0)}s)...`, 'info');
            
            try {
                const exporter = new VideoExporter(project, options);
                const startTime = Date.now();
                const blob = await exporter.export();
                const endTime = Date.now();
                
                const url = URL.createObjectURL(blob);
                addVideoToGrid(testName, url, blob, project, endTime - startTime);
                
                generatedVideos.push({
                    id: testName,
                    filename: `${testName}.webm`,
                    url: url,
                    blob: blob,
                    project: project,
                    generationTime: endTime - startTime
                });
                
                log(`✅ ${testName} - ${(blob.size/1024/1024).toFixed(2)} MB (${((endTime - startTime) / 1000).toFixed(1)}s)`, 'success');
                return true;
                
            } catch (error) {
                log(`❌ Erro em ${testName}: ${error.message}`, 'error');
                return false;
            }
        }
        
        function addVideoToGrid(testName, videoUrl, blob, project, generationTime) {
            const grid = document.getElementById('video-grid');
            const card = document.createElement('div');
            card.className = 'video-card';
            
            const formatInfo = VIDEO_FORMATS[project.videoFormat];
            const duration = project.pages.reduce((sum, p) => sum + (p.duration || 8), 0);
            const totalPages = project.pages.length;
            const avgPageDuration = (duration / totalPages).toFixed(1);
            
            card.innerHTML = `
                <h3>${testName}</h3>
                <video controls loop>
                    <source src="${videoUrl}" type="video/webm">
                </video>
                <div class="video-info">
                    📐 ${formatInfo.width}×${formatInfo.height}<br>
                    📄 ${totalPages} páginas<br>
                    ⏱ ${duration}s total (${avgPageDuration}s/página)<br>
                    🎬 ${project.pages.map(p => p.kenBurns).filter((v, i, a) => a.indexOf(v) === i).join(', ')}<br>
                    🔄 ${project.pages.map(p => p.transition).filter((v, i, a) => a.indexOf(v) === i).join(', ')}
                </div>
                <div class="video-stats">
                    <span>💾 ${(blob.size/1024/1024).toFixed(2)} MB</span>
                    <span>⚡ ${((generationTime || 0) / 1000).toFixed(1)}s</span>
                </div>
            `;
            
            grid.appendChild(card);
        }
        
        async function runStressTest() {
            await runTestWithOptions({
                formats: ['vertical', 'widescreen', 'square', 'portrait'],
                pageCount: parseInt(document.getElementById('numberOfPages').value),
                durationPerPage: parseInt(document.getElementById('durationPerPage').value),
                textSize: document.getElementById('textSize').value,
                kenBurnsType: document.getElementById('kenBurnsEffect').value,
                transitionType: document.getElementById('transitions').value,
                videoQuality: parseInt(document.getElementById('videoQuality').value)
            });
        }
        
        async function runQuickTest() {
            await runTestWithOptions({
                formats: ['vertical', 'widescreen', 'square'],
                pageCount: 3,
                durationPerPage: 5,
                textSize: 'large',
                kenBurnsType: 'all',
                transitionType: 'all',
                videoQuality: 8000000
            });
        }
        
        async function runExtremeTest() {
            await runTestWithOptions({
                formats: ['vertical', 'widescreen'],
                pageCount: 10,
                durationPerPage: 10,
                textSize: 'xlarge',
                kenBurnsType: 'all',
                transitionType: 'all',
                videoQuality: 12000000
            });
        }
        
        async function runTestWithOptions(options) {
            if (isGenerating) return;
            isGenerating = true;
            testStartTime = Date.now();
            
            document.getElementById('btn-run').disabled = true;
            document.getElementById('btn-quick').disabled = true;
            document.getElementById('btn-extreme').disabled = true;
            updateStatus('Gerando vídeos de teste...');
            
            const testCount = options.formats.length;
            let successCount = 0;
            
            log(`Iniciando teste de estresse: ${testCount} vídeos, ${options.pageCount} páginas cada`, 'info');
            
            for (let i = 0; i < testCount; i++) {
                const format = options.formats[i];
                const project = createStressTestProject(
                    format,
                    options.pageCount,
                    options.durationPerPage,
                    options.textSize,
                    options.kenBurnsType,
                    options.transitionType
                );
                
                const success = await generateVideo(project, { videoBitrate: options.videoQuality });
                if (success) successCount++;
                updateProgress(i + 1, testCount);
                
                // Pequena pausa entre vídeos
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            const testEndTime = Date.now();
            const totalTestTime = (testEndTime - testStartTime) / 1000;
            
            updateStatus('Concluído!');
            log(`✅ Teste completo! ${successCount}/${testCount} vídeos criados em ${totalTestTime.toFixed(1)}s`, 'success');
            
            updateSummary(successCount, totalTestTime);
            
            document.getElementById('btn-run').disabled = false;
            document.getElementById('btn-quick').disabled = false;
            document.getElementById('btn-extreme').disabled = false;
            document.getElementById('btn-download').disabled = false;
            isGenerating = false;
        }
        
        function updateSummary(successCount, testTime) {
            const summary = document.getElementById('summary');
            summary.style.display = 'block';
            
            const totalSize = generatedVideos.reduce((sum, v) => sum + v.blob.size, 0);
            const totalDuration = generatedVideos.reduce((sum, v) => 
                sum + v.project.pages.reduce((s, p) => s + (p.duration || 8), 0), 0);
            
            document.getElementById('total-videos').textContent = successCount;
            document.getElementById('total-duration').textContent = `${totalDuration}s`;
            document.getElementById('total-size').textContent = `${(totalSize/1024/1024).toFixed(1)} MB`;
            document.getElementById('avg-size').textContent = `${(totalSize/1024/1024/successCount).toFixed(1)} MB`;
            document.getElementById('success-rate').textContent = `${Math.round(successCount/generatedVideos.length*100)}%`;
            document.getElementById('test-time').textContent = `${testTime.toFixed(1)}s`;
        }
        
        function downloadAll() {
            generatedVideos.forEach(video => {
                const a = document.createElement('a');
                a.href = video.url;
                a.download = video.filename;
                a.click();
            });
            log(`Download iniciado para ${generatedVideos.length} vídeos...`, 'info');
        }
        
        function clearResults() {
            if (confirm('Tem certeza que deseja limpar todos os resultados?')) {
                generatedVideos.forEach(v => URL.revokeObjectURL(v.url));
                generatedVideos = [];
                document.getElementById('video-grid').innerHTML = '';
                document.getElementById('summary').style.display = 'none';
                document.getElementById('log').innerHTML = '';
                updateProgress(0, 0);
                updateStatus('Pronto');
                log('Resultados limpos. Pronto para novo teste.', 'info');
            }
        }
        
        log('Sistema de teste de estresse pronto. Configure as opções e inicie o teste.', 'info');
    </script>
</body>
</html>
