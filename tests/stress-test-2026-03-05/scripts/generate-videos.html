<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Vídeos - HQ Movie</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            background: #0f0f0f;
            color: #fff;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #14b8a6; margin-bottom: 10px; }
        .status { 
            background: #1a1a1a; 
            padding: 20px; 
            border-radius: 8px; 
            margin: 20px 0;
            border: 1px solid #333;
        }
        .progress-bar {
            background: #333;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            background: linear-gradient(90deg, #14b8a6, #0d9488);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .video-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s;
        }
        .video-card:hover {
            border-color: #14b8a6;
            transform: translateY(-2px);
        }
        .video-card h3 {
            margin: 0 0 10px;
            font-size: 14px;
            color: #14b8a6;
        }
        .video-card video {
            width: 100%;
            border-radius: 4px;
            background: #000;
        }
        .video-info {
            font-size: 11px;
            color: #888;
            margin-top: 8px;
        }
        button {
            background: #14b8a6;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            margin-right: 10px;
        }
        button:hover { background: #0d9488; }
        button:disabled {
            background: #333;
            cursor: not-allowed;
        }
        .log {
            background: #000;
            padding: 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .log-entry { margin: 2px 0; }
        .log-success { color: #2ecc71; }
        .log-error { color: #e74c3c; }
        .log-info { color: #888; }
    </style>
</head>
<body>
    <h1>🎬 Gerador de Vídeos - HQ Movie Stress Test</h1>
    <p>Gera vídeos WebM para todos os 28 projetos de teste com animações Ken Burns aplicadas.</p>

    <div class="status">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <strong>Status:</strong> <span id="status-text">Pronto</span>
            </div>
            <div>
                <strong>Progresso:</strong> <span id="progress-text">0/28</span>
            </div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div style="margin-top: 10px;">
            <button onclick="generateAll()" id="btn-generate">▶ Gerar Todos os Vídeos</button>
            <button onclick="generateSample()" id="btn-sample">🎯 Gerar Amostra (4 vídeos)</button>
            <button onclick="clearVideos()">🗑 Limpar</button>
        </div>
        <div class="log" id="log"></div>
    </div>

    <div class="video-grid" id="video-grid"></div>

    <script src="https://unpkg.com/dexie@3.2.7/dist/dexie.min.js"></script>
    <script src="../../layouts-video.js"></script>
    <script src="../../app.js"></script>
    <script src="../../video-exporter.js"></script>
    
    <script>
        let generatedVideos = [];
        let isGenerating = false;

        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function updateProgress(current, total) {
            document.getElementById('progress-text').textContent = `${current}/${total}`;
            document.getElementById('progress-fill').style.width = `${(current/total)*100}%`;
        }

        function updateStatus(text) {
            document.getElementById('status-text').textContent = text;
        }

        async function loadProject(filename) {
            const response = await fetch(`../projects/${filename}`);
            return await response.json();
        }

        async function generateVideo(project, filename) {
            log(`Gerando: ${project.metadata.name}...`, 'info');
            
            try {
                const exporter = new VideoExporter(project);
                const blob = await exporter.export();
                
                // Criar URL do blob
                const url = URL.createObjectURL(blob);
                
                // Adicionar ao grid
                addVideoToGrid(project, url, blob.size);
                
                generatedVideos.push({
                    filename: filename.replace('.json', '.webm'),
                    url: url,
                    blob: blob,
                    project: project
                });
                
                log(`✓ ${project.metadata.name} - ${(blob.size/1024/1024).toFixed(2)} MB`, 'success');
                return true;
                
            } catch (error) {
                log(`✗ Erro em ${project.metadata.name}: ${error.message}`, 'error');
                return false;
            }
        }

        function addVideoToGrid(project, videoUrl, size) {
            const grid = document.getElementById('video-grid');
            const card = document.createElement('div');
            card.className = 'video-card';
            
            const formatInfo = VIDEO_FORMATS[project.videoFormat];
            const kenBurnsIcon = {
                static: '⏹', zoomIn: '🔍', zoomOut: '🔎',
                panLeft: '⬅', panRight: '➡', panUp: '⬆', float: '🌊'
            };
            
            card.innerHTML = `
                <h3>${kenBurnsIcon[project.pages[0].kenBurns]} ${project.metadata.name}</h3>
                <video controls loop>
                    <source src="${videoUrl}" type="video/webm">
                </video>
                <div class="video-info">
                    📐 ${formatInfo.width}×${formatInfo.height} | 
                    ⏱ ${project.pages[0].duration}s | 
                    💾 ${(size/1024/1024).toFixed(2)} MB
                </div>
            `;
            
            grid.appendChild(card);
        }

        async function generateAll() {
            if (isGenerating) return;
            isGenerating = true;
            
            document.getElementById('btn-generate').disabled = true;
            document.getElementById('btn-sample').disabled = true;
            
            const projects = [
                // Vertical
                'vertical-static.json', 'vertical-zoomIn.json', 'vertical-zoomOut.json',
                'vertical-panLeft.json', 'vertical-panRight.json', 'vertical-panUp.json', 'vertical-float.json',
                // Widescreen
                'widescreen-static.json', 'widescreen-zoomIn.json', 'widescreen-zoomOut.json',
                'widescreen-panLeft.json', 'widescreen-panRight.json', 'widescreen-panUp.json', 'widescreen-float.json',
                // Square
                'square-static.json', 'square-zoomIn.json', 'square-zoomOut.json',
                'square-panLeft.json', 'square-panRight.json', 'square-panUp.json', 'square-float.json',
                // Portrait
                'portrait-static.json', 'portrait-zoomIn.json', 'portrait-zoomOut.json',
                'portrait-panLeft.json', 'portrait-panRight.json', 'portrait-panUp.json', 'portrait-float.json'
            ];
            
            log('Iniciando geração de 28 vídeos...', 'info');
            updateStatus('Gerando...');
            
            for (let i = 0; i < projects.length; i++) {
                const project = await loadProject(projects[i]);
                await generateVideo(project, projects[i]);
                updateProgress(i + 1, projects.length);
            }
            
            updateStatus('Concluído!');
            log(`✓ Geração completa! ${generatedVideos.length} vídeos criados.`, 'success');
            
            document.getElementById('btn-generate').disabled = false;
            document.getElementById('btn-sample').disabled = false;
            isGenerating = false;
        }

        async function generateSample() {
            if (isGenerating) return;
            isGenerating = true;
            
            document.getElementById('btn-generate').disabled = true;
            document.getElementById('btn-sample').disabled = true;
            
            const samples = [
                'vertical-zoomIn.json',
                'widescreen-panLeft.json',
                'square-float.json',
                'portrait-static.json'
            ];
            
            log('Gerando amostra de 4 vídeos...', 'info');
            updateStatus('Gerando amostra...');
            
            for (let i = 0; i < samples.length; i++) {
                const project = await loadProject(samples[i]);
                await generateVideo(project, samples[i]);
                updateProgress(i + 1, samples.length);
            }
            
            updateStatus('Amostra concluída!');
            log(`✓ Amostra completa! ${samples.length} vídeos criados.`, 'success');
            
            document.getElementById('btn-generate').disabled = false;
            document.getElementById('btn-sample').disabled = false;
            isGenerating = false;
        }

        function clearVideos() {
            document.getElementById('video-grid').innerHTML = '';
            generatedVideos.forEach(v => URL.revokeObjectURL(v.url));
            generatedVideos = [];
            updateProgress(0, 28);
            updateStatus('Pronto');
            log('Vídeos limpos.', 'info');
        }

        log('Sistema pronto. Clique em "Gerar Amostra" para testar ou "Gerar Todos" para criar os 28 vídeos.', 'info');
    </script>
</body>
</html>
